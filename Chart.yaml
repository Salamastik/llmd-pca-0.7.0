apiVersion: v2
name: precise-prefix-cache-routing
description: >
  Umbrella Helm chart for the llm-d precise-prefix-cache-routing guide.
  Deploys the llm-d Router in Standalone mode (InferencePool + EPP + Envoy sidecar)
  together with a vLLM model server configured for ZMQ-based KV-cache event streaming.
type: application
version: 0.1.0
appVersion: "v0.7.0"

# Prerequisites (run once per cluster/namespace):
#   export GAIE_VERSION=v1.5.0
#   kubectl apply -f https://github.com/kubernetes-sigs/gateway-api-inference-extension/releases/download/${GAIE_VERSION}/v1-manifests.yaml
#   kubectl create secret generic llm-d-hf-token --from-literal="HF_TOKEN=<token>" -n <namespace>
#
# Before first install, resolve the OCI dependency:
#   helm dependency update
#
# IMPORTANT – router chart version:
#   The guide and all CI workflows install this chart with --version v0
#   (an OCI channel tag, not semver). Helm dependencies require semver, so
#   run the following to find the actual chart semver stored inside that tag:
#     helm show chart oci://ghcr.io/llm-d/charts/llm-d-router-standalone-dev --version v0
#   Then replace the version field below with the returned semver (e.g. 0.1.0).
#
# IMPORTANT – model server chart:
#   The official Helm chart is llm-d-incubation/llm-d-modelservice (v0.4.13).
#   Source: https://github.com/llm-d-incubation/llm-d-modelservice
#   Repo:   https://llm-d-incubation.github.io/llm-d-modelservice/
#   Note:   marked "deprecated" as of v0.7 in favour of Kustomize, but it
#           remains the only published Helm chart and continues to receive
#           releases (v0.4.13 published 2026-06-05).
#   The local charts/modelservice/ directory is kept as a lightweight
#   alternative that mirrors only the fields needed by this guide.

dependencies:
  # llm-d Router in Standalone Mode — deploys InferencePool CRD instance + EPP + Envoy sidecar.
  # Published at oci://ghcr.io/llm-d/charts/llm-d-router-standalone-dev
  # Source: https://github.com/kubernetes-sigs/gateway-api-inference-extension/tree/main/config/charts/standalone
  #
  # Replace the version below with the semver returned by:
  #   helm show chart oci://ghcr.io/llm-d/charts/llm-d-router-standalone-dev --version v0
  - name: llm-d-router-standalone-dev
    alias: inferencepool
    version: "0.1.0"   # <-- verify: helm show chart oci://ghcr.io/llm-d/charts/llm-d-router-standalone-dev --version v0
    repository: "oci://ghcr.io/llm-d/charts"

  # Official llm-d model server Helm chart.
  # Latest: v0.4.13  |  https://llm-d-incubation.github.io/llm-d-modelservice/
  # TGZ also available in official-charts/llm-d-modelservice-v0.4.13.tgz
  - name: llm-d-modelservice
    alias: modelservice
    version: "v0.4.13"
    repository: "https://llm-d-incubation.github.io/llm-d-modelservice/"
