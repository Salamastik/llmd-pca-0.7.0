# Base values for the precise-prefix-cache-routing umbrella chart.
# Source for inferencepool defaults: guides/recipes/router/base.values.yaml
# Override with values-override.yaml for the full guide configuration.

# ---------------------------------------------------------------------------
# inferencepool — llm-d Router Standalone Mode (InferencePool + EPP + Envoy)
# ---------------------------------------------------------------------------
inferencepool:
  router:
    epp:
      replicas: 1
      image:
        registry: ghcr.io/llm-d
        repository: llm-d-router-endpoint-picker-dev
        tag: main
        pullPolicy: Always
      flags:
        v: 2
      pluginsConfigFile: "default-plugins.yaml"
      resources:
        requests:
          cpu: "4"
          memory: 8Gi
        limits:
          memory: 16Gi

    inferencePool:
      failureMode: "FailOpen"

    modelServers:
      protocol: http

    proxy:
      args:
        - "--service-node"
        - "envoy-sidecar"
        - "--log-level"
        - "warn"
        - "--concurrency"
        - "8"
        - "--drain-strategy"
        - "immediate"
        - "--drain-time-s"
        - "60"
        - "-c"
        - "/etc/envoy/envoy.yaml"
      resources:
        requests:
          cpu: "4"
          memory: 8Gi
        limits:
          memory: 16Gi

    tracing:
      otelExporterEndpoint: "http://localhost:4317"
      sampling:
        sampler: "parentbased_traceidratio"
        samplerArg: "0.1"

# ---------------------------------------------------------------------------
# modelservice — vLLM model server (local subchart)
# ---------------------------------------------------------------------------
modelservice:
  replicaCount: 1

  image:
    repository: vllm/vllm-openai
    tag: v0.19.1
    pullPolicy: IfNotPresent

  model:
    name: "Qwen/Qwen3-32B"

  extraArgs: []

  env: []

  extraPorts: []

  labels: {}

  resources:
    limits:
      cpu: "16"
      memory: "128Gi"
      nvidia.com/gpu: "2"
    requests:
      cpu: "8"
      memory: "96Gi"
      nvidia.com/gpu: "2"

  volumeMounts: []

  volumes: []

  probes:
    startup:
      initialDelaySeconds: 15
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 120
    liveness:
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      periodSeconds: 5
      timeoutSeconds: 2
      failureThreshold: 3

  serviceAccount:
    create: true
    name: ""
